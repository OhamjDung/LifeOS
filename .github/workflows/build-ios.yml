name: Build iOS IPA

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Debug npm install result
        working-directory: mobile
        run: |
          echo "=== react-native version installed ==="
          node -e "console.log(require('./node_modules/react-native/package.json').version)"
          echo "=== reanimated version ==="
          node -e "console.log(require('./node_modules/react-native-reanimated/package.json').version)" 2>/dev/null || echo "not found"
          echo "=== worklets version ==="
          node -e "console.log(require('./node_modules/react-native-worklets/package.json').version)" 2>/dev/null || echo "not found"
          echo "=== voice package ==="
          node -e "console.log(require('./node_modules/@react-native-voice/voice/package.json').version)" 2>/dev/null || echo "not found"
          echo "=== ExpoModulesCore xcframework in node_modules ==="
          find node_modules/expo-modules-core -name "ExpoModulesCore.xcframework" -maxdepth 5 2>/dev/null || echo "xcframework NOT in node_modules"
          find node_modules/expo-modules-core/ios -maxdepth 2 2>/dev/null | head -20

      - name: Patch expo-av Swift for ExpoModulesCore 56
        working-directory: mobile
        run: |
          # expo-av 15 predates ExpoModulesCore 56's Promise API change:
          # Promise.ResolveClosure is now @Sendable (JavaScriptValue) -> Void, but the legacy
          # ObjC setFullscreen expects EXPromiseResolveBlock (@Sendable (Any?) -> Void).
          # Promise.resolve(Any?) still exists — wrap it in a matching closure.
          python3 << 'PYEOF'
          path = 'node_modules/expo-av/ios/EXAV/Video/VideoViewModule.swift'
          old = 'resolver: promise.resolver'
          new = 'resolver: { (value: Any?) in promise.resolve(value) }'
          src = open(path).read()
          if new in src:
              print('already patched')
          elif old in src:
              open(path, 'w').write(src.replace(old, new, 1))
              print('patched', path)
          else:
              raise SystemExit(f'ERROR: expected pattern not found in {path} — expo-av version changed?')
          PYEOF

      - name: Write .env file
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\n' "$EXPO_PUBLIC_SUPABASE_URL" > .env
          printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          printf 'EXPO_PUBLIC_BUILD_ID=ci-%s\n' "$(date +%Y%m%d-%H%M%S)" >> .env
          echo "=== env var lengths ==="
          echo "URL chars: ${#EXPO_PUBLIC_SUPABASE_URL}"
          echo "KEY chars: ${#EXPO_PUBLIC_SUPABASE_ANON_KEY}"
          echo "=== .env contents (keys only) ==="
          cut -d= -f1 .env

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Debug Podfile content
        working-directory: mobile/ios
        run: |
          echo "=== Full Podfile ==="
          cat Podfile
          echo "=== END Podfile ==="

      - name: Patch Podfile for CI
        working-directory: mobile/ios
        run: |
          # Single injection into post_install: ENABLE_USER_SCRIPT_SANDBOXING=NO for all targets.
          # EXAV-specific fixes (legacy shim path, React-VFS overlay flags) are applied by editing
          # EXAV's xcconfig files in the 'Create ExpoModulesCore legacy header shim' step AFTER pod
          # install — NOT via target build_settings here. Run 64 proved Expo/RN's own post_install
          # hooks merge target-level values into a Ruby array that ends up stringified
          # ('["...", "..."]') in the build command, mangling every path in it.
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = (
              "\n  installer.pods_project.targets.each do |target|\n"
              "    target.build_configurations.each do |config|\n"
              "      config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'\n"
              "    end\n"
              "  end\n"
          )
          content = content.replace('post_install do |installer|', 'post_install do |installer|' + inject, 1)
          with open('Podfile', 'w') as f:
              f.write(content)
          print('Podfile patched successfully')
          PYEOF
          echo "=== Podfile after patch (post_install section) ==="
          awk '/post_install/,/^end/' Podfile | head -60

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Create ExpoModulesCore legacy header shim
        working-directory: mobile/ios
        run: |
          # expo-av 15 imports <ExpoModulesCore/EXEventEmitter.h> etc. — Legacy module-API
          # headers. expo-modules-core 56.x deleted ios/Legacy/ from its npm source, and the
          # prebuilt xcframework omits these headers from its public Headers/ (while keeping
          # most legacy class headers and their symbols). Vendored copies live in
          # mobile/ci/expo-legacy-shim/ (from expo-modules-core 3.0.30 — see README there).
          # Copy into the shim dir ONLY headers the xcframework does NOT ship — every header
          # stays reachable through exactly ONE search mechanism (shim via -I, framework via
          # -F). Copying a header that exists in the framework recreates the dual-path ODR
          # failure from run 3.
          XCF_HDR="Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ios-arm64/ExpoModulesCore.framework/Headers"
          VENDORED="../ci/expo-legacy-shim/ExpoModulesCore"
          SHIM="ExpoModulesCoreShim/ExpoModulesCore"
          test -d "$XCF_HDR" || { echo "ERROR: xcframework Headers not found at $XCF_HDR"; exit 1; }
          test -d "$VENDORED" || { echo "ERROR: vendored shim headers not found at $VENDORED"; exit 1; }
          mkdir -p "$SHIM"
          copied=0; skipped=0
          for h in "$VENDORED"/*.h; do
            name=$(basename "$h")
            if [ -f "$XCF_HDR/$name" ]; then
              skipped=$((skipped+1))
            else
              cp "$h" "$SHIM/$name"
              copied=$((copied+1))
            fi
          done
          echo "Copied $copied headers absent from xcframework; skipped $skipped present in framework"
          echo "=== Shim contents ==="
          ls "$SHIM"
          echo "=== Sanity: EXEventEmitter.h must be in shim ==="
          test -f "$SHIM/EXEventEmitter.h" && echo "OK" || { echo "MISSING — header present in xcframework now? Check skip list above"; exit 1; }

      - name: Wire EXAV xcconfig (shim + React-VFS overlay)
        working-directory: mobile/ios
        run: |
          # Edit EXAV's xcconfig files directly — the same layer Expo/RN use. Patching target
          # build_settings in post_install gets mangled by Expo/RN's later hooks (run 64: values
          # merged into a Ruby array and stringified into the build command).
          # - shim dir: Legacy-API headers absent from the ExpoModulesCore xcframework
          # - VFS virtual root (-I) + -ivfsoverlay: RN 0.85 prebuilt React resolves <React/X.h>
          #   through the React-VFS.yaml overlay; expo-av 15 depends on ReactCommon (not
          #   React-Core) so RN's hook never wires it up (runs 60-64).
          python3 << 'PYEOF'
          import os
          pods_root = os.path.abspath('Pods')
          vfs_yaml = f'"{pods_root}/React-Core-prebuilt/React-VFS.yaml"'
          hsp_add = ' "${PODS_ROOT}/../ExpoModulesCoreShim" "${PODS_ROOT}/React-Core-prebuilt/React.xcframework/Headers"'
          cflags_add = f' -ivfsoverlay {vfs_yaml}'
          sflags_add = f' -Xcc -ivfsoverlay -Xcc {vfs_yaml}'
          for cfg in ('release', 'debug'):
              path = f'Pods/Target Support Files/EXAV/EXAV.{cfg}.xcconfig'
              if not os.path.exists(path):
                  raise SystemExit(f'ERROR: {path} not found')
              lines = open(path).read().splitlines()
              keys_seen = set()
              for i, line in enumerate(lines):
                  key = line.split('=')[0].strip() if '=' in line else ''
                  if key == 'HEADER_SEARCH_PATHS':
                      lines[i] = line + hsp_add
                  elif key == 'OTHER_CFLAGS':
                      lines[i] = line + cflags_add
                  elif key == 'OTHER_SWIFT_FLAGS':
                      lines[i] = line + sflags_add
                  keys_seen.add(key)
              if 'OTHER_CFLAGS' not in keys_seen:
                  lines.append('OTHER_CFLAGS = $(inherited)' + cflags_add)
              if 'OTHER_SWIFT_FLAGS' not in keys_seen:
                  lines.append('OTHER_SWIFT_FLAGS = $(inherited)' + sflags_add)
              if 'HEADER_SEARCH_PATHS' not in keys_seen:
                  lines.append('HEADER_SEARCH_PATHS = $(inherited)' + hsp_add)
              open(path, 'w').write('\n'.join(lines) + '\n')
              print(f'patched {path}')
          PYEOF
          echo "=== EXAV.release.xcconfig after patch (relevant lines) ==="
          grep -E "OTHER_CFLAGS|OTHER_SWIFT_FLAGS" "Pods/Target Support Files/EXAV/EXAV.release.xcconfig"
          grep -oE 'HEADER_SEARCH_PATHS.{0,80}' "Pods/Target Support Files/EXAV/EXAV.release.xcconfig" | head -1

      - name: Diagnose ExpoModulesCore xcframework headers
        working-directory: mobile/ios
        run: |
          # Diagnostic only — DO NOT copy headers.
          # Copying creates Pods/Headers/Public/ExpoModulesCore/ (HEADER_SEARCH_PATHS) while
          # xcodebuild also exposes the same headers via XCFrameworkIntermediates (FRAMEWORK_SEARCH_PATHS).
          # Two paths → same header compiled twice → ODR redefinition errors at link.
          # The Podfile post_install patch above adds the xcframework arm64 slice to
          # FRAMEWORK_SEARCH_PATHS for all Expo consumer pods instead.
          echo "=== ExpoModulesCore xcframework structure ==="
          find Pods/ExpoModulesCore -maxdepth 5 -name "*.h" | head -10 || echo "no .h found"
          echo "=== xcframework slices ==="
          ls Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ 2>/dev/null || echo "xcframework not found"
          echo "=== ios-arm64 headers (first 20) ==="
          ls "Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ios-arm64/ExpoModulesCore.framework/Headers/" 2>/dev/null | head -20 || echo "arm64 headers not found"
          echo "=== Pods/Headers/Public/ExpoModulesCore (should be EMPTY/absent) ==="
          ls Pods/Headers/Public/ExpoModulesCore/ 2>/dev/null && echo "WARNING: public header copy exists — will cause ODR" || echo "OK: no public header copy"
          echo "=== UMAppLoader public headers (ExpoTaskManager dependency) ==="
          ls Pods/Headers/Public/UMAppLoader/ 2>/dev/null || echo "MISSING: Pods/Headers/Public/UMAppLoader"
          echo "=== ExpoTaskManager xcconfig search paths ==="
          grep -E "SEARCH_PATHS" "Pods/Target Support Files/ExpoTaskManager/ExpoTaskManager.release.xcconfig" 2>/dev/null || echo "xcconfig not found"
          echo "=== EXAV xcconfig search paths ==="
          grep -E "SEARCH_PATHS" "Pods/Target Support Files/EXAV/EXAV.release.xcconfig" 2>/dev/null || echo "xcconfig not found"
          echo "=== React-VFS.yaml (resolved overlay — what maps where) ==="
          head -60 Pods/React-Core-prebuilt/React-VFS.yaml 2>/dev/null || echo "React-VFS.yaml not found"
          echo "=== React-Core-prebuilt layout ==="
          ls Pods/React-Core-prebuilt/ 2>/dev/null
          ls Pods/React-Core-prebuilt/React.xcframework/ 2>/dev/null
          echo "=== React.xcframework top-level Headers (first 10) ==="
          ls Pods/React-Core-prebuilt/React.xcframework/Headers/ 2>/dev/null | head -10 || echo "no top-level Headers"
          echo "=== react-native-voice xcconfig (working <React/...> consumer) ==="
          grep -E "OTHER_CFLAGS|SEARCH_PATHS|SWIFT_FLAGS" "Pods/Target Support Files/react-native-voice/react-native-voice.release.xcconfig" 2>/dev/null || echo "xcconfig not found"
          echo "=== EXAV xcconfig flags ==="
          grep -E "OTHER_CFLAGS|SWIFT_FLAGS" "Pods/Target Support Files/EXAV/EXAV.release.xcconfig" 2>/dev/null || echo "xcconfig not found"

      - name: Debug post-pod-install
        working-directory: mobile/ios
        run: |
          echo "=== Xcode/Swift version ==="
          xcodebuild -version && swift --version
          echo "=== ExpoModulesCore pod directory ==="
          ls Pods/ExpoModulesCore/ 2>/dev/null | head -20 || echo "dir not found"
          echo "=== ExpoModulesCore xcframework exists? ==="
          ls Pods/ExpoModulesCore/ExpoModulesCore.xcframework 2>/dev/null && echo "YES - xcframework present" || echo "NO - xcframework absent (will build from source)"
          echo "=== ExpoModulesCore xcframework Swift version (if present) ==="
          head -5 "Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ios-arm64/ExpoModulesCore.framework/Modules/ExpoModulesCore.swiftmodule/arm64-apple-ios.swiftinterface" 2>/dev/null || \
          head -5 "Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ios-arm64_x86_64-simulator/ExpoModulesCore.framework/Modules/ExpoModulesCore.swiftmodule/arm64-apple-ios-simulator.swiftinterface" 2>/dev/null || echo "no swiftinterface found"
          echo "=== ExpoModulesJSI pod directory ==="
          ls Pods/ExpoModulesJSI/ 2>/dev/null | head -10 || echo "Pods/ExpoModulesJSI not found"
          echo "=== ExpoModulesJSI in node_modules ==="
          ls node_modules/expo-modules-jsi/apple/Sources/ExpoModulesJSI/ 2>/dev/null | head -10 || echo "not found at that path"
          find ../node_modules -name "JSIRepresentable.swift" 2>/dev/null | head -5
          echo "=== All xcframeworks in Pods ==="
          find Pods -name "*.xcframework" -maxdepth 4 2>/dev/null | head -20

      - name: Build archive (unsigned)
        working-directory: mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_BUILD_ID: ci-${{ github.run_number }}
        run: |
          # NOTE: the shell runs with -e. A plain `pipeline; STATUS=$?` dies at the failing
          # pipeline before any error extraction runs (this silently skipped error reporting
          # in runs 1-59). `if ! pipeline` suspends -e for the pipeline itself.
          set -o pipefail
          if ! xcodebuild archive \
            -workspace ios/LifeOS.xcworkspace \
            -scheme LifeOS \
            -configuration Release \
            -archivePath $RUNNER_TEMP/LifeOS.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            SKIP_INSTALL=NO \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            -destination "generic/platform=iOS" \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty; then
            echo "=== XCODEBUILD ERRORS ==="
            grep -E "(error:|ARCHIVE FAILED|nonzero exit code|PhaseScriptExecution|The following build commands failed)" /tmp/xcodebuild.log | head -80
            echo "=== LAST 150 RAW LOG LINES ==="
            tail -150 /tmp/xcodebuild.log
            exit 65
          fi

      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 3

      - name: Package IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/LifeOS.xcarchive/Products -name "*.app" | head -1)
          echo "App path: $APP_PATH"
          ls "$APP_PATH" | grep -E "Info.plist|_CodeSignature" || echo "WARNING: missing expected files"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r LifeOS-unsigned.ipa Payload/
          echo "IPA size: $(du -sh LifeOS-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS V2
          path: LifeOS-unsigned.ipa
          retention-days: 7
