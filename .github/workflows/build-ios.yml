name: Build iOS IPA

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (Swift 6.3.1 — matches Expo SDK 56 prebuilt xcframeworks)
        run: |
          echo "=== Available Xcode versions ==="
          ls /Applications/ | grep -i xcode
          echo "=== Selecting Xcode 26.x ==="
          sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer
          echo "=== Active Xcode ==="
          xcodebuild -version
          swift --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        working-directory: mobile
        run: npx expo prebuild --platform ios --clean --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Patch Podfile for CI
        working-directory: mobile/ios
        run: |
          # Disable precompile xcframework building (fails in CI without tarball cache)
          sed -i '' 's/.*precompile.*$/# &/' Podfile || true
          # Inject ENABLE_USER_SCRIPT_SANDBOXING=NO into existing post_install block
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          inject = (
              "\n  installer.pods_project.targets.each do |target|\n"
              "    target.build_configurations.each do |config|\n"
              "      config.build_settings['ENABLE_USER_SCRIPT_SANDBOXING'] = 'NO'\n"
              "    end\n"
              "  end"
          )
          content = content.replace('post_install do |installer|', 'post_install do |installer|' + inject, 1)
          with open('Podfile', 'w') as f:
              f.write(content)
          print('Podfile patched')
          PYEOF

      - name: Install CocoaPods
        working-directory: mobile/ios
        run: pod install

      - name: Debug post-pod-install
        working-directory: mobile/ios
        run: |
          echo "=== Xcode/Swift version at build time ==="
          xcodebuild -version
          swift --version
          echo "=== ExpoModulesJSI xcframework contents ==="
          find Pods/ExpoModulesJSI -maxdepth 4 | sort
          echo "=== ExpoModulesCore xcframework swift modules ==="
          find Pods/ExpoModulesCore -name "*.swiftinterface" 2>/dev/null | head -5
          echo "=== ExpoModulesCore compiled-with Swift version ==="
          head -3 Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ios-arm64/ExpoModulesCore.framework/Modules/ExpoModulesCore.swiftmodule/arm64-apple-ios.swiftinterface 2>/dev/null || \
          head -3 Pods/ExpoModulesCore/ExpoModulesCore.xcframework/ios-arm64_x86_64-simulator/ExpoModulesCore.framework/Modules/ExpoModulesCore.swiftmodule/arm64-apple-ios-simulator.swiftinterface 2>/dev/null || true

      - name: Build archive (unsigned)
        working-directory: mobile
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/LifeOS.xcworkspace \
            -scheme LifeOS \
            -configuration Release \
            -archivePath $RUNNER_TEMP/LifeOS.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            -destination "generic/platform=iOS" \
            2>&1 | tee /tmp/xcodebuild.log | xcpretty; \
          STATUS=${PIPESTATUS[0]}; \
          if [ $STATUS -ne 0 ]; then \
            echo "=== XCODEBUILD ERRORS ===" && \
            grep -E "(error:|PhaseScript|FAILED|Script-)" /tmp/xcodebuild.log | head -60; \
            exit $STATUS; \
          fi

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r $RUNNER_TEMP/LifeOS.xcarchive/Products/Applications/*.app Payload/
          zip -r LifeOS-unsigned.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LifeOS-iOS
          path: LifeOS-unsigned.ipa
          retention-days: 7
